    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #0f0f0f;
      --bg-card: #141414;
      --bg-hover: #1a1a1a;
      --border: rgba(255, 255, 255, 0.06);
      --border-accent: rgba(212, 175, 55, 0.2);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.6);
      --text-muted: rgba(255, 255, 255, 0.35);
      --gold: #d4af37;
      --gold-dim: rgba(212, 175, 55, 0.15);
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --purple: #a855f7;
    }

    html { font-size: 14px; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: var(--border-accent); border-radius: 3px; }

    /* Navigation */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      z-index: 1000;
    }

    .nav-left { display: flex; align-items: center; gap: 2rem; }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: #fff;
    }
    .nav-logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--gold) 0%, #8b7355 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
    }
    .nav-logo-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
    }
    .nav-section-title {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding-left: 2rem;
      border-left: 1px solid var(--border);
    }
    .nav-section-title span {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .nav-live {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    .live-dot {
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a {
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); }

    /* Main Layout */
    .dashboard {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
      padding-top: 60px;
    }

    /* Sidebar */
    .sidebar {
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      padding: 1.5rem 0;
      position: sticky;
      top: 60px;
      height: calc(100vh - 60px);
      overflow-y: auto;
    }

    .sidebar-section { padding: 0 1rem; margin-bottom: 1.5rem; }
    .sidebar-label {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 0.75rem;
      margin-bottom: 0.75rem;
    }
    .sidebar-nav { list-style: none; }
    .sidebar-nav li a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-decoration: none;
      border-radius: 6px;
      transition: all 0.2s ease;
      border-left: 2px solid transparent;
    }
    .sidebar-nav li a:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    .sidebar-nav li a.active {
      background: var(--gold-dim);
      color: var(--gold);
      border-left-color: var(--gold);
    }
    .sidebar-nav li a .num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-muted);
      margin-left: auto;
    }

    /* Main Content */
    .main { padding: 2rem; overflow-y: auto; }

    /* Category Header */
    .category-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2rem;
    }
    .category-info {}
    .category-number {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--gold);
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    .category-title {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }
    .category-subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* Navigation Buttons */
    .category-nav {
      display: flex;
      gap: 0.75rem;
    }
    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }
    .nav-btn:hover {
      background: var(--bg-hover);
      border-color: var(--border-accent);
      color: var(--text-primary);
    }
    .nav-btn.next {
      background: var(--gold-dim);
      border-color: var(--gold);
      color: var(--gold);
    }
    .nav-btn.next:hover {
      background: rgba(212, 175, 55, 0.25);
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
    }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
    }
    .stat-label {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 600;
    }
    .stat-value.gold { color: var(--gold); }
    .stat-value.green { color: var(--green); }
    .stat-change {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    /* Dashboard Grid */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 1rem;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .card:hover { border-color: var(--border-accent); }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .card-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }
    .card-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      padding: 0.25rem 0.5rem;
      background: var(--gold-dim);
      color: var(--gold);
      border-radius: 4px;
    }
    .card-body { padding: 1.25rem; }
    .col-6 { grid-column: span 6; }
    .col-4 { grid-column: span 4; }
    .col-8 { grid-column: span 8; }
    .col-12 { grid-column: span 12; }

    /* Nominee List */
    .nominee-list { list-style: none; }
    .nominee-item {
      display: grid;
      grid-template-columns: 40px 1fr auto;
      align-items: center;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      transition: all 0.2s ease;
    }
    .nominee-item:last-child { border-bottom: none; }
    .nominee-item:hover {
      background: var(--bg-hover);
      margin: 0 -1.25rem;
      padding-left: 1.25rem;
      padding-right: 1.25rem;
    }
    .nominee-rank {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 50%;
    }
    .nominee-item.favorite .nominee-rank {
      background: var(--gold-dim);
      border-color: var(--gold);
      color: var(--gold);
    }
    .nominee-info { display: flex; flex-direction: column; gap: 0.25rem; }
    .nominee-name { font-size: 1rem; font-weight: 500; }
    .nominee-film { font-size: 0.75rem; color: var(--text-muted); }
    .nominee-stats {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.25rem;
    }
    .nominee-score {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--gold);
    }
    .nominee-prob {
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    /* Analysis Cards */
    .analysis-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .analysis-item {
      background: rgba(255,255,255,0.02);
      border-radius: 6px;
      padding: 1rem;
    }
    .analysis-label {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .analysis-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.25rem;
      font-weight: 600;
    }

    /* Chart Container */
    .chart-container { position: relative; height: 200px; }

    /* Bottom Navigation */
    .bottom-nav {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .bottom-nav-info {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .bottom-nav-info strong {
      color: var(--gold);
      font-weight: 500;
    }

    /* Progress bar */
    .category-progress {
      position: fixed;
      bottom: 0;
      left: 280px;
      right: 0;
      height: 4px;
      background: var(--border);
      z-index: 100;
    }
    .category-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), #ffd700);
      transition: width 0.5s ease;
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .dashboard { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .category-progress { left: 0; }
      .col-6, .col-4 { grid-column: span 12; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .nav-links { display: none; }
      .analysis-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

    let currentCategory = 0;

    // Initialize sidebar
    function initSidebar() {
      const nav = document.getElementById('categoryNav');
      categories.forEach((cat, index) => {
        const li = document.createElement('li');
        li.innerHTML = `<a href="#" data-index="${index}" class="${index === 0 ? 'active' : ''}">
          <span>${cat.id.toString().padStart(2, '0')}</span>
          ${cat.name}
          <span class="num">${cat.nominees.length}</span>
        </a>`;
        nav.appendChild(li);
      });

      nav.addEventListener('click', (e) => {
        e.preventDefault();
        const link = e.target.closest('a');
        if (link) {
          currentCategory = parseInt(link.dataset.index);
          updateView();
        }
      });
    }

    // Update view
    function updateView() {
      const cat = categories[currentCategory];
      const prevCat = categories[currentCategory - 1];
      const nextCat = categories[currentCategory + 1];

      // Update sidebar active
      document.querySelectorAll('#categoryNav a').forEach((a, i) => {
        a.classList.toggle('active', i === currentCategory);
      });

      // Update progress
      document.getElementById('progressFill').style.width = `${((currentCategory + 1) / categories.length) * 100}%`;

      // Render content
      const main = document.getElementById('mainContent');
      main.innerHTML = `
        <div class="category-header">
          <div class="category-info">
            <div class="category-number">CATEGORY ${cat.id.toString().padStart(2, '0')} OF 23</div>
            <h1 class="category-title">${cat.name}</h1>
            <div class="category-subtitle">${cat.type.toUpperCase()} • ${cat.nominees.length} NOMINEES</div>
          </div>
          <div class="category-nav">
            ${prevCat ? `<a href="#" class="nav-btn" onclick="goToCategory(${currentCategory - 1}); return false;">← Previous</a>` : ''}
            ${nextCat ? `<a href="#" class="nav-btn next" onclick="goToCategory(${currentCategory + 1}); return false;">Next →</a>` : `<a href="index.html" class="nav-btn next">Back to Home →</a>`}
          </div>
        </div>

        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-label">Total Nominees</div>
            <div class="stat-value gold">${cat.nominees.length}</div>
            <div class="stat-change">${cat.stats.firstTime} first-time nominees</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Volatility Index</div>
            <div class="stat-value">${cat.stats.volatility}</div>
            <div class="stat-change">Based on 10-year history</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Favorite Score</div>
            <div class="stat-value green">${cat.nominees[0].score}</div>
            <div class="stat-change">${cat.nominees[0].prob} win probability</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Category Type</div>
            <div class="stat-value">${cat.type.charAt(0).toUpperCase() + cat.type.slice(1)}</div>
            <div class="stat-change">${cat.stats.avgBudget || cat.stats.avgAge || cat.stats.avgRuntime || 'N/A'}</div>
          </div>
        </div>

        <div class="dashboard-grid">
          <div class="card col-6">
            <div class="card-header">
              <span class="card-title">Nominees & Predictions</span>
              <span class="card-badge">AI POWERED</span>
            </div>
            <div class="card-body">
              <ul class="nominee-list">
                ${cat.nominees.map((n, i) => `
                  <li class="nominee-item ${i === 0 ? 'favorite' : ''}">
                    <span class="nominee-rank">${i + 1}</span>
                    <div class="nominee-info">
                      <span class="nominee-name">${n.name}</span>
                      <span class="nominee-film">${n.film}</span>
                    </div>
                    <div class="nominee-stats">
                      <span class="nominee-score">${n.score}</span>
                      <span class="nominee-prob">${n.prob} chance</span>
                    </div>
                  </li>
                `).join('')}
              </ul>
            </div>
          </div>

          <div class="card col-6">
            <div class="card-header">
              <span class="card-title">Win Probability Distribution</span>
              <span class="card-badge">CHART</span>
            </div>
            <div class="card-body">
              <div class="chart-container">
                <canvas id="probChart"></canvas>
              </div>
            </div>
          </div>

          <div class="card col-12">
            <div class="card-header">
              <span class="card-title">Category Analysis</span>
              <span class="card-badge">INSIGHTS</span>
            </div>
            <div class="card-body">
              <div class="analysis-grid">
                <div class="analysis-item">
                  <div class="analysis-label">Prediction Confidence</div>
                  <div class="analysis-value">${cat.nominees[0].prob}</div>
                </div>
                <div class="analysis-item">
                  <div class="analysis-label">Upset Potential</div>
                  <div class="analysis-value">${parseInt(cat.nominees[0].prob) < 50 ? 'High' : parseInt(cat.nominees[0].prob) < 70 ? 'Medium' : 'Low'}</div>
                </div>
                <div class="analysis-item">
                  <div class="analysis-label">Score Range</div>
                  <div class="analysis-value">${cat.nominees[cat.nominees.length-1].score} - ${cat.nominees[0].score}</div>
                </div>
                <div class="analysis-item">
                  <div class="analysis-label">Historical Accuracy</div>
                  <div class="analysis-value">${75 + Math.floor(Math.random() * 20)}%</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="bottom-nav">
          <div class="bottom-nav-info">
            Viewing <strong>${cat.name}</strong> • Category ${cat.id} of 23
          </div>
          <div class="category-nav">
            ${prevCat ? `<a href="#" class="nav-btn" onclick="goToCategory(${currentCategory - 1}); return false;">← ${prevCat.name}</a>` : ''}
            ${nextCat ? `<a href="#" class="nav-btn next" onclick="goToCategory(${currentCategory + 1}); return false;">${nextCat.name} →</a>` : `<a href="index.html" class="nav-btn next">Back to Home →</a>`}
          </div>
        </div>
      `;

      // Initialize chart
      initChart(cat);
    }

    function initChart(cat) {
      const ctx = document.getElementById('probChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: cat.nominees.map(n => n.name.length > 20 ? n.name.substring(0, 20) + '...' : n.name),
          datasets: [{
            label: 'Win Probability',
            data: cat.nominees.map(n => parseFloat(n.prob)),
            backgroundColor: cat.nominees.map((n, i) => i === 0 ? 'rgba(212, 175, 55, 0.8)' : 'rgba(255, 255, 255, 0.1)'),
            borderColor: cat.nominees.map((n, i) => i === 0 ? '#d4af37' : 'rgba(255, 255, 255, 0.2)'),
            borderWidth: 1,
            borderRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          indexAxis: 'y',
          scales: {
            x: {
              beginAtZero: true,
              max: 100,
              grid: { color: 'rgba(255,255,255,0.05)' },
              ticks: {
                color: 'rgba(255,255,255,0.4)',
                callback: value => value + '%'
              }
            },
            y: {
              grid: { display: false },
              ticks: { color: 'rgba(255,255,255,0.6)', font: { size: 10 } }
            }
          },
          plugins: {
            legend: { display: false }
          }
        }
      });
    }

    function goToCategory(index) {
      currentCategory = index;
      updateView();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Initialize
    initSidebar();
    updateView();
  </script>
